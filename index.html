<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Miguel Lopes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bg: #f6f6f3;
      --text: #111;
      --muted: #6d6d6d;
      --line: #dddddd;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    .page {
      max-width: 1240px;
      margin: 0 auto;
      padding: 36px 24px 48px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 48px;
      position: relative;
      z-index: 10;
    }

    .brand {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: inherit;
      text-decoration: none;
    }

    .menu-toggle {
      border: none;
      background: none;
      font-size: 1.6rem;
      cursor: pointer;
      padding: 4px 8px;
      line-height: 1;
      color: var(--text);
    }

    nav {
      position: fixed;
      top: 0;
      right: 0;
      width: 300px;
      max-width: 88vw;
      height: 100vh;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 90px 28px 28px;
      box-shadow: -8px 0 30px rgba(0,0,0,0.08);
      transform: translateX(100%);
      transition: transform 0.25s ease;
      z-index: 30;
    }

    nav.open {
      transform: translateX(0);
    }

    nav a {
      font-size: 0.95rem;
      color: var(--muted);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    nav a:hover {
      color: var(--text);
    }

    .menu-section {
      margin-top: 10px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .menu-label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 10px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.1fr 1.6fr;
      gap: 28px;
      align-items: end;
    }

    .hero-text {
      padding-bottom: 18px;
    }

    .hero-kicker {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      margin-bottom: 18px;
    }

    .hero h1 {
      font-size: clamp(2.2rem, 6vw, 5rem);
      line-height: 0.95;
      margin-bottom: 18px;
      text-transform: uppercase;
    }

    .hero p {
      font-size: 1rem;
      color: var(--muted);
      max-width: 34ch;
      line-height: 1.5;
    }

    .hero-meta {
      margin-top: 26px;
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .hero-image-wrap {
      width: 100%;
      background: #ecebe7;
      min-height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .hero-image {
      width: 100%;
      height: 100%;
      max-height: 78vh;
      object-fit: contain;
      display: block;
      cursor: pointer;
    }

    .hero-caption {
      margin-top: 12px;
      font-size: 0.82rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.94);
      z-index: 1000;
    }

    .modal.open {
      display: block;
    }

    .modal-content {
      position: absolute;
      inset: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .close {
      position: absolute;
      top: 18px;
      right: 28px;
      color: white;
      font-size: 34px;
      line-height: 1;
      cursor: pointer;
      z-index: 1001;
    }

    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .hero-image-wrap {
        min-height: auto;
      }

      .hero-image {
        max-height: 68vh;
      }

      .brand {
        font-size: 1.4rem;
      }
    }

    @media (max-width: 768px) {
      .page {
        padding: 22px 16px 32px;
      }

      header {
        margin-bottom: 28px;
      }

      .hero h1 {
        font-size: 2.5rem;
      }

      .modal-content {
        inset: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <a href="index.html" class="brand">Miguel Lopes</a>
      <button class="menu-toggle" aria-label="Abrir menu">☰</button>
    </header>

    <nav id="main-menu">
      <a href="index.html">Início</a>
      <a href="portfolio.html">Portfolio</a>

      <div class="menu-section">
        <div class="menu-label">Séries</div>
        <a href="greve-geral.html">Greve Geral</a>
        <a href="nao-as-mega-centrais-solares.html">Não às mega centrais solares</a>
        <a href="paisagens.html">Paisagens</a>
        <a href="wsl.html">WSL</a>
        <a href="diversos.html">Diversos</a>
      </div>

      <div class="menu-section">
        <a href="sobre.html">Sobre</a>
      </div>
    </nav>

    <main class="hero">
      <section class="hero-text">
        <div class="hero-kicker">Portfolio</div>
        <h1>Fotografia documental e autoral</h1>
        <p>
          Uma seleção aleatória do meu trabalho entre protesto, território, paisagem e observação do quotidiano.
        </p>
        <div class="hero-meta" id="hero-meta">Imagem em destaque</div>
      </section>

      <section>
        <div class="hero-image-wrap">
          <img id="random-photo" class="hero-image" src="" alt="Fotografia em destaque">
        </div>
        <div id="photo-caption" class="hero-caption"></div>
      </section>
    </main>
  </div>

  <div id="modal" class="modal">
    <span class="close">&times;</span>
    <div class="modal-content">
      <img id="modal-img" src="" alt="Fotografia ampliada">
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const allPhotos = [
        { src: 'images/greve-geral/GG1.jpg', caption: 'Greve Geral, 2025', series: 'Greve Geral' },
        { src: 'images/greve-geral/GG2.jpg', caption: 'Greve Geral, 2025', series: 'Greve Geral' },
        { src: 'images/greve-geral/GG3.jpg', caption: 'Greve Geral, 2025', series: 'Greve Geral' },
        { src: 'images/greve-geral/GG4.jpg', caption: 'Greve Geral, 2025', series: 'Greve Geral' },
        { src: 'images/greve-geral/GG5.jpg', caption: 'Greve Geral, 2025', series: 'Greve Geral' },

        { src: 'images/solares/Solar1.jpg', caption: 'Não às mega centrais solares, 25/26', series: 'Não às mega centrais solares' },
        { src: 'images/solares/Solar2.jpg', caption: 'Não às mega centrais solares, 25/26', series: 'Não às mega centrais solares' },
        { src: 'images/solares/Solar3.jpg', caption: 'Não às mega centrais solares, 25/26', series: 'Não às mega centrais solares' },
        { src: 'images/solares/Solar4.jpg', caption: 'Não às mega centrais solares, 25/26', series: 'Não às mega centrais solares' },
        { src: 'images/solares/Solar5.jpg', caption: 'Não às mega centrais solares, 25/26', series: 'Não às mega centrais solares' }
      ];

      const menuToggle = document.querySelector('.menu-toggle');
      const mainMenu = document.getElementById('main-menu');
      const randomPhoto = document.getElementById('random-photo');
      const photoCaption = document.getElementById('photo-caption');
      const heroMeta = document.getElementById('hero-meta');

      const modal = document.getElementById('modal');
      const modalImg = document.getElementById('modal-img');
      const closeBtn = document.querySelector('.close');

      menuToggle.addEventListener('click', () => {
        mainMenu.classList.toggle('open');
      });

      const randomIndex = Math.floor(Math.random() * allPhotos.length);
      const selectedPhoto = allPhotos[randomIndex];

      randomPhoto.src = selectedPhoto.src;
      randomPhoto.alt = selectedPhoto.caption;
      photoCaption.textContent = selectedPhoto.caption;
      heroMeta.textContent = selectedPhoto.series;

      randomPhoto.addEventListener('click', () => {
        modal.classList.add('open');
        modalImg.src = selectedPhoto.src;
        modalImg.alt = selectedPhoto.caption;
        document.body.style.overflow = 'hidden';
      });

      closeBtn.addEventListener('click', () => {
        modal.classList.remove('open');
        document.body.style.overflow = '';
      });

      modal.addEventListener('click', (e) => {
        if (e.target === modal) {
          modal.classList.remove('open');
          document.body.style.overflow = '';
        }
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          modal.classList.remove('open');
          document.body.style.overflow = '';
        }
      });
    });
  </script>
</body>
</html>
