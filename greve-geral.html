<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Greve Geral – Miguel Lopes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bg: #f7f7f7;
      --text: #111;
      --muted: #666;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    /* HEADER + HAMBÚRGUER */

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      position: relative;
      z-index: 10;
    }
    .brand {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: inherit;
      text-decoration: none;
    }
    .menu-toggle {
      border: none;
      background: none;
      font-size: 1.6rem;
      cursor: pointer;
      padding: 4px 8px;
      line-height: 1;
    }

    /* MENU OVERLAY */

    nav {
      position: fixed;
      top: 0;
      right: 0;
      width: 240px;
      height: 100vh;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 80px 24px 24px;
      box-shadow: -4px 0 20px rgba(0,0,0,0.1);
      transform: translateX(100%);
      transition: transform 0.25s ease;
      z-index: 20;
    }
    nav.open {
      transform: translateX(0);
    }
    nav a {
      font-size: 0.95rem;
      color: var(--muted);
      text-decoration: none;
    }
    nav a:hover {
      text-decoration: underline;
    }

    /* TÍTULO + GALERIA */

    .series-header {
      margin-bottom: 24px;
    }
    .series-name {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .series-meta {
      font-size: 0.95rem;
      color: var(--muted);
    }

    .thumbs-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }
    .thumb {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .thumb:hover {
      transform: scale(1.02);
    }

    /* MODAL */

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.95);
      animation: fadeIn 0.3s;
    }
    .modal-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90vw;
      max-width: 1200px;
      height: 90vh;
      max-height: 90vh;
      border: 1px solid #fff;
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .modal img {
      flex: 1;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
    }
    .caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      color: white;
      padding: 16px 24px;
      font-size: 0.9rem;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      text-align: center;
    }
    .close {
      position: absolute;
      top: 20px;
      right: 30px;
      color: white;
      font-size: 32px;
      font-weight: bold;
      cursor: pointer;
      z-index: 1001;
      line-height: 1;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    }
    .close:hover {
      color: #ccc;
    }
